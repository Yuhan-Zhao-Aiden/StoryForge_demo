name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - CI/CD
  pull_request:
    branches:
      - main

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build

      - name: Run tests (if configured)
        run: |
          if [ -f "jest.config.js" ] || [ -f "vitest.config.js" ] || [ -f "package.json" ] && npm run | grep -q " test"; then
            npm test
          else
            echo "No tests configured - skipping test step"
          fi

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  success-message:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [quality-checks, security-check]
    
    steps:
      - name: Display status
        run: |
          echo "✅ Type checking completed"
          echo "✅ Build successful"
          echo "✅ Security audit completed"
